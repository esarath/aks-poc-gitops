# File: environments/dev/app-poc/web-deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: web-api
  namespace: app-poc
  labels:
    app: web-api
    version: "1.0"
  annotations:
    vault.hashicorp.com/agent-inject: "true"
    vault.hashicorp.com/role: "app-poc"
    vault.hashicorp.com/agent-inject-secret-db: "secret/data/app-poc/db"
    vault.hashicorp.com/agent-inject-template-db: |
      {{- with secret "secret/data/app-poc/db" -}}
      export DB_NAME="{{ .Data.data.db-name }}"
      export DB_USER="{{ .Data.data.db-user }}"
      export DB_PASSWORD="{{ .Data.data.db-password }}"
      {{- end }}
spec:
  replicas: 2
  selector:
    matchLabels:
      app: web-api
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: web-api
    spec:
      tolerations:
        - key: workload
          operator: Equal
          value: user
          effect: NoSchedule
      containers:
        - name: web-api
          image: esarathmails/aks-poc-web:latest
          ports:
            - containerPort: 8000
              name: http
          env:
            - name: DB_HOST
              value: "postgresql-service"
            - name: DB_NAME
              valueFrom:
                secretKeyRef:
                  name: db-credentials
                  key: db-name
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: db-credentials
                  key: db-user
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: db-credentials
                  key: db-password
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            runAsUser: 1000
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
      securityContext:
        fsGroup: 2000
